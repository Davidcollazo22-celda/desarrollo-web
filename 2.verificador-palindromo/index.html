<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Palíndromos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>¿Es un palíndromo?</h1>
        <p class="description">Ingresa una palabra o frase y descubre si se lee igual al derecho y al revés.</p>
        
        <input type="text" id="textInput" placeholder="Ejemplo: Anita lava la tina" autofocus>
        
        <button id="checkBtn">Comprobar</button>
        
        <div class="result" id="result">
           
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Empleados</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Sistema de Gestión de Empleados</h1>
        
     
        <div class="form-container">
            <h2>Agregar nuevo empleado</h2>
            <form id="employeeForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">Nombre *</label>
                        <input type="text" id="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Apellido *</label>
                        <input type="text" id="lastName" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Teléfono *</label>
                        <input type="tel" id="phone" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="salary">Salario ($) *</label>
                        <input type="number" id="salary" min="0" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="birthdate">Fecha de nacimiento *</label>
                        <input type="date" id="birthdate" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="photo">URL de la foto (opcional)</label>
                    <input type="url" id="photo" placeholder="https://ejemplo.com/foto.jpg">
                </div>
                
                <button type="submit" id="submitBtn">Agregar empleado</button>
            </form>
        </div>

       
        <div class="employees-container">
            <h2>Lista de empleados</h2>
            <div id="employeesList" class="employees-list">
              
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

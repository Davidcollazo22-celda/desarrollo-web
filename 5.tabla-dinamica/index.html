<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla ordenable y filtrable</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Gestión de Elementos</h1>
        
        <!-- Formulario para agregar/editar -->
        <div class="form-container">
            <h2 id="formTitle">Agregar nuevo elemento</h2>
            <form id="itemForm">
                <input type="hidden" id="itemId" value="">
                <div class="form-group">
                    <label for="name">Nombre:</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="category">Categoría:</label>
                    <select id="category" required>
                        <option value="">Selecciona una categoría</option>
                        <option value="Electrónica">Electrónica</option>
                        <option value="Libro">Libro</option>
                        <option value="Ropa">Ropa</option>
                        <option value="Hogar">Hogar</option>
                        <option value="Juguete">Juguete</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="year">Año:</label>
                    <input type="number" id="year" min="1900" max="2100" required>
                </div>
                <button type="submit" id="submitBtn">Agregar</button>
                <button type="button" id="cancelBtn" class="cancel-btn">Cancelar</button>
            </form>
        </div>

        <!-- Filtro de búsqueda -->
        <div class="filter-container">
            <input type="text" id="filterInput" placeholder="Filtrar por nombre, categoría o año...">
        </div>

        <!-- Tabla -->
        <table id="dataTable">
            <thead>
                <tr>
                    <th data-sort="name">Nombre <span class="sort-indicator"></span></th>
                    <th data-sort="category">Categoría <span class="sort-indicator"></span></th>
                    <th data-sort="year">Año <span class="sort-indicator"></span></th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Los datos se insertarán aquí -->
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>

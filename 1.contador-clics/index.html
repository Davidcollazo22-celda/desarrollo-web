<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador con clics</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Contador</h1>
        <div class="counter-display" id="mainCounter">0</div>
        
        <div class="buttons">
            <button id="incrementBtn">Incrementar</button>
            <button id="decrementBtn">Decrementar</button>
        </div>

        <div class="click-counters">
            <p>Clics en Incrementar: <span id="incrementClicks">0</span></p>
            <p>Clics en Decrementar: <span id="decrementClicks">0</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
